services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: mpv2
      POSTGRES_USER: mpv2
      POSTGRES_PASSWORD: mpv2
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"   # 5432 ocupado por otro proyecto
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mpv2"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"   # 6379 ocupado por otro proyecto, usamos 6380 externamente
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://mpv2:mpv2@postgres/mpv2
      REDIS_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    volumes:
      - .:/app
      - .mp:/app/.mp
      - ./Songs:/app/Songs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: celery -A backend.workers.celery_app worker --loglevel=info --concurrency=2
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://mpv2:mpv2@postgres/mpv2
      REDIS_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    volumes:
      - .:/app
      - .mp:/app/.mp
      - ./Songs:/app/Songs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  remotion-service:
    build:
      context: ./remotion-service
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      OUTPUT_DIR: /app/.mp
    volumes:
      - .mp:/app/.mp
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
